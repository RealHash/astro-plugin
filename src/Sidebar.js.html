<script>
(function () {
  var state = {
    bootstrap: null,
    collapsedSections: {},
    activeTab: 'planets',
    view: 'browse'
  };
  var statusTimer = null;

  document.addEventListener('DOMContentLoaded', function () {
    bindEvents();
    loadBootstrap();
  });

  function bindEvents() {
    document.getElementById('searchInput').addEventListener('input', renderCatalog);
    document.getElementById('spaceModeSelect').addEventListener('change', persistPreferences);
    document.getElementById('presentationModeSelect').addEventListener('change', persistPreferences);
    document.getElementById('fontToggle').addEventListener('change', persistPreferences);
    document.getElementById('openSettingsButton').addEventListener('click', function () {
      setView(state.view === 'settings' ? 'browse' : 'settings');
    });
  }

  function loadBootstrap() {
    google.script.run
      .withSuccessHandler(initializeApp)
      .withFailureHandler(handleServerFailure)
      .getSidebarBootstrap(navigator.language || 'es');
  }

  function initializeApp(bootstrap) {
    state.bootstrap = bootstrap;
    state.activeTab = getCategoryTabs_()[0].key;
    applyStrings();
    applyPreferences();
    renderQuickAccess();
    renderCategoryTabs();
    renderCatalog();
    setView(state.view);
  }

  function applyStrings() {
    var strings = state.bootstrap.strings;

    document.getElementById('loadingState').textContent = strings.sidebar.loading;
    document.getElementById('searchInput').placeholder = strings.sidebar.searchPlaceholder;
    document.getElementById('spaceModeLabel').textContent = strings.sidebar.spaceMode;
    document.getElementById('presentationModeLabel').textContent = strings.sidebar.presentationMode;
    document.getElementById('presentationHelperText').textContent = strings.sidebar.presentationHelper;
    document.getElementById('fontToggleLabel').textContent = strings.sidebar.fontToggle;
    document.getElementById('fontHelperText').textContent = strings.sidebar.fontHelper;
    document.getElementById('localeBadge').textContent = strings.sidebar.localeBadge;
    document.getElementById('quickStrip').setAttribute('aria-label', strings.sidebar.quickAccess);
    document.getElementById('categoryTabs').setAttribute('aria-label', strings.sidebar.categories);
    document.getElementById('settingsTitle').textContent = strings.sidebar.settingsTitle;

    var spaceModeSelect = document.getElementById('spaceModeSelect');
    spaceModeSelect.querySelector('option[value="none"]').textContent = strings.sidebar.insertOnly;
    spaceModeSelect.querySelector('option[value="wrap"]').textContent = strings.sidebar.insertWrapped;

    var presentationModeSelect = document.getElementById('presentationModeSelect');
    presentationModeSelect.querySelector('option[value="auto"]').textContent = strings.sidebar.presentationAuto;
    presentationModeSelect.querySelector('option[value="text"]').textContent = strings.sidebar.presentationText;
    presentationModeSelect.querySelector('option[value="emoji"]').textContent = strings.sidebar.presentationEmoji;
  }

  function applyPreferences() {
    var preferences = state.bootstrap.preferences;

    document.getElementById('spaceModeSelect').value = preferences.spaceMode;
    document.getElementById('presentationModeSelect').value = preferences.presentationMode;
    document.getElementById('fontToggle').checked = Boolean(preferences.applyPreferredFont);
  }

  function persistPreferences() {
    var payload = {
      spaceMode: document.getElementById('spaceModeSelect').value,
      presentationMode: document.getElementById('presentationModeSelect').value,
      applyPreferredFont: document.getElementById('fontToggle').checked
    };

    google.script.run
      .withSuccessHandler(function (preferences) {
        syncPreferences(preferences);
      })
      .withFailureHandler(handleServerFailure)
      .saveUserPreferencesFromSidebar(payload);
  }

  function setView(view) {
    state.view = view === 'settings' ? 'settings' : 'browse';
    document.getElementById('browseView').hidden = state.view !== 'browse';
    document.getElementById('settingsPanel').hidden = state.view !== 'settings';
    updateHeaderActionLabel_();
  }

  function updateHeaderActionLabel_() {
    var button = document.getElementById('openSettingsButton');
    var label = state.view === 'settings'
      ? state.bootstrap.strings.sidebar.backToCatalog
      : state.bootstrap.strings.sidebar.settings;

    button.textContent = label;
    button.setAttribute('aria-label', label);
  }

  function renderCatalog() {
    if (!state.bootstrap) {
      return;
    }

    var strings = state.bootstrap.strings;
    var catalogRoot = document.getElementById('catalogRoot');
    var query = normalizeText(document.getElementById('searchInput').value);
    var currentTab = getCurrentTab_();
    var mainItems = getItemsForTab_(currentTab).filter(function (item) {
      return !query || item.searchText.indexOf(query) > -1;
    });
    var favoriteItems = getFavoriteItems_().filter(function (item) {
      return !query || item.searchText.indexOf(query) > -1;
    });

    if (!mainItems.length && !favoriteItems.length) {
      catalogRoot.innerHTML = '<div class="empty-state">' + escapeHtml(strings.sidebar.noResults) + '</div>';
      return;
    }

    catalogRoot.innerHTML = [
      mainItems.length ? renderGridSection_(currentTab.label, mainItems, false) : '',
      favoriteItems.length ? renderGridSection_(strings.sidebar.favorites, favoriteItems, true) : ''
    ].join('');

    bindSymbolEvents();
  }

  function renderQuickAccess() {
    if (!state.bootstrap) {
      return;
    }

    var quickStrip = document.getElementById('quickStrip');
    var quickAccessIds = (state.bootstrap.preferences.recentSymbolIds || []);

    if (!quickAccessIds.length) {
      quickAccessIds = (((state.bootstrap.config || {}).app || {}).quickAccessSymbolIds || []);
    }

    var itemsById = state.bootstrap.catalog.items.reduce(function (accumulator, item) {
      accumulator[item.id] = item;
      return accumulator;
    }, {});
    var quickItems = quickAccessIds.map(function (symbolId) {
      return itemsById[symbolId];
    }).filter(Boolean);

    if (!quickItems.length) {
      quickStrip.hidden = true;
      quickStrip.innerHTML = '';
      return;
    }

    quickStrip.hidden = false;
    quickStrip.innerHTML = quickItems.map(function (item) {
      return '<button class="quick-symbol" type="button" title="' + escapeHtml(buildItemTitle(item)) + '" aria-label="' + escapeHtml(item.label) + '" data-quick-symbol="' + escapeHtml(item.id) + '">' + escapeHtml(formatSymbolForUi(item.symbol)) + '</button>';
    }).join('');

    bindQuickAccessEvents();
  }

  function renderCategoryTabs() {
    var categoryTabs = document.getElementById('categoryTabs');
    var tabs = getCategoryTabs_();

    categoryTabs.innerHTML = tabs.map(function (tab) {
      var isActive = tab.key === state.activeTab;
      return '<button class="category-tab' + (isActive ? ' is-active' : '') + '" type="button" role="tab" aria-selected="' + (isActive ? 'true' : 'false') + '" data-category-tab="' + escapeHtml(tab.key) + '">' + escapeHtml(tab.label) + '</button>';
    }).join('');

    Array.prototype.forEach.call(document.querySelectorAll('[data-category-tab]'), function (button) {
      button.addEventListener('click', function () {
        state.activeTab = button.getAttribute('data-category-tab');
        renderCategoryTabs();
        renderCatalog();
      });
    });
  }

  function renderGridSection_(label, items, isSecondary) {
    return [
      '<section class="section-card' + (isSecondary ? ' section-card-secondary' : '') + '">',
      '  <div class="section-static-header">',
      '    <span class="section-title">' + escapeHtml(label) + '</span>',
      '    <span class="section-count">' + items.length + '</span>',
      '  </div>',
      '  <div class="section-content">',
      items.map(renderItem).join(''),
      '  </div>',
      '</section>'
    ].join('');
  }

  function renderItem(item) {
    var title = buildItemTitle(item);

    return '<button class="symbol-tile' + (item.isFavorite ? ' is-favorite' : '') + '" type="button" title="' + escapeHtml(title) + '" aria-label="' + escapeHtml(item.label) + '" data-symbol-card="' + escapeHtml(item.id) + '" data-insert-symbol="' + escapeHtml(item.id) + '">' + escapeHtml(formatSymbolForUi(item.symbol)) + '</button>';
  }

  function bindQuickAccessEvents() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-quick-symbol]'), function (button) {
      button.addEventListener('click', function () {
        var symbolId = button.getAttribute('data-quick-symbol');
        insertSymbol(symbolId, button);
      });
    });
  }

  function bindSymbolEvents() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-insert-symbol]'), function (button) {
      button.addEventListener('click', function () {
        var symbolId = button.getAttribute('data-insert-symbol');
        insertSymbol(symbolId, button);
      });
    });

  }

  function insertSymbol(symbolId, button) {
    var payload = {
      symbolId: symbolId,
      locale: state.bootstrap.locale,
      spaceMode: document.getElementById('spaceModeSelect').value,
      presentationMode: document.getElementById('presentationModeSelect').value,
      applyPreferredFont: document.getElementById('fontToggle').checked,
      source: 'sidebar'
    };

    button.classList.add('is-working');

    google.script.run
      .withSuccessHandler(function (result) {
        button.classList.remove('is-working');

        if (!result || !result.ok) {
          showStatus(result && result.message ? result.message : state.bootstrap.strings.errors.unexpected, 'error');
          return;
        }

        if (result.preferences) {
          syncPreferences(result.preferences);
          renderQuickAccess();
          renderCatalog();
        }

        pulseCard(symbolId);
        showStatus(result.message, 'success');
      })
      .withFailureHandler(function (error) {
        button.classList.remove('is-working');
        handleServerFailure(error);
      })
      .insertSymbolFromSidebar(payload);
  }

  function toggleFavorite(symbolId, button) {
    var item = findItem(symbolId);
    var shouldFavorite = !item || !item.isFavorite;

    button.disabled = true;

    google.script.run
      .withSuccessHandler(function (result) {
        button.disabled = false;

        if (!result || !result.ok) {
          showStatus(result && result.message ? result.message : state.bootstrap.strings.errors.unexpected, 'error');
          return;
        }

        if (result.preferences) {
          syncPreferences(result.preferences);
          renderCatalog();
        }

        showStatus(result.message, 'info');
      })
      .withFailureHandler(function (error) {
        button.disabled = false;
        handleServerFailure(error);
      })
      .setFavoriteSymbolFromSidebar({
        symbolId: symbolId,
        isFavorite: shouldFavorite,
        locale: state.bootstrap.locale
      });
  }

  function copySymbol(symbolId) {
    var item = findItem(symbolId);

    if (!item) {
      showStatus(state.bootstrap.strings.errors.symbolNotFound, 'error');
      return;
    }

    copyText(formatSymbolForClipboard(item.symbol))
      .then(function () {
        showStatus(state.bootstrap.strings.sidebar.copied, 'info');
      })
      .catch(function () {
        showStatus(state.bootstrap.strings.sidebar.copyFailed, 'error');
      });
  }

  function getCategoryTabs_() {
    var strings = state.bootstrap ? state.bootstrap.strings : { sidebar: {} };

    return [
      { key: 'planets', label: strings.sidebar.tabPlanets || 'Planetas', categoryKeys: ['planets'] },
      { key: 'signs', label: strings.sidebar.tabSigns || 'Zodiaco', categoryKeys: ['signs'] },
      { key: 'points', label: strings.sidebar.tabPoints || 'Puntos', categoryKeys: ['points'] },
      { key: 'angles', label: strings.sidebar.tabAngles || 'Angulos', categoryKeys: ['angles'] },
      { key: 'aspects', label: strings.sidebar.tabAspects || 'Aspectos', categoryKeys: ['major_aspects', 'minor_aspects'] },
      { key: 'houses', label: strings.sidebar.tabHouses || 'Casas', categoryKeys: ['houses'] },
      { key: 'classification', label: strings.sidebar.tabEtc || 'Etc', categoryKeys: ['classification'] }
    ];
  }

  function getCurrentTab_() {
    var tabs = getCategoryTabs_();

    for (var i = 0; i < tabs.length; i += 1) {
      if (tabs[i].key === state.activeTab) {
        return tabs[i];
      }
    }

    return tabs[0];
  }

  function getItemsForTab_(tab) {
    return state.bootstrap.catalog.items.filter(function (item) {
      return tab.categoryKeys.indexOf(item.categoryKey) > -1;
    });
  }

  function getFavoriteItems_() {
    var favoriteIds = state.bootstrap.preferences.favorites || [];
    var itemsById = state.bootstrap.catalog.items.reduce(function (accumulator, item) {
      accumulator[item.id] = item;
      return accumulator;
    }, {});

    return favoriteIds.map(function (symbolId) {
      return itemsById[symbolId];
    }).filter(Boolean);
  }

  function syncPreferences(partialPreferences) {
    state.bootstrap.preferences = Object.assign({}, state.bootstrap.preferences, partialPreferences);
    state.bootstrap.catalog.items = state.bootstrap.catalog.items.map(function (item) {
      return Object.assign({}, item, {
        isFavorite: state.bootstrap.preferences.favorites.indexOf(item.id) > -1
      });
    });
  }

  function pulseCard(symbolId) {
    var card = document.querySelector('[data-symbol-card="' + symbolId + '"]');

    if (!card) {
      return;
    }

    card.classList.add('is-success');
    window.setTimeout(function () {
      card.classList.remove('is-success');
    }, 900);
  }

  function showStatus(message, type) {
    var statusBar = document.getElementById('statusBar');

    statusBar.textContent = message;
    statusBar.className = 'status-bar status-' + type;

    if (statusTimer) {
      window.clearTimeout(statusTimer);
    }

    statusTimer = window.setTimeout(function () {
      statusBar.className = 'status-bar is-hidden';
      statusBar.textContent = '';
    }, 5000);
  }

  function handleServerFailure(error) {
    console.error(error);
    showStatus(state.bootstrap ? state.bootstrap.strings.errors.unexpected : 'Unexpected error.', 'error');
  }

  function findItem(symbolId) {
    return state.bootstrap.catalog.items.find(function (item) {
      return item.id === symbolId;
    });
  }

  function buildItemTitle(item) {
    var parts = [item.label, item.categoryLabel];

    if (item.unicode) {
      parts.push(item.unicode);
    }

    if (item.note) {
      parts.push(item.note);
    }

    return parts.join(' • ');
  }

  function formatSymbolForClipboard(symbol) {
    var presentationMode = document.getElementById('presentationModeSelect').value;
    var cleanSymbol = String(symbol || '').replace(/[\uFE0E\uFE0F]/g, '');

    if (presentationMode === 'text' && cleanSymbol.length === 1) {
      return cleanSymbol + '\uFE0E';
    }

    if (presentationMode === 'emoji' && cleanSymbol.length === 1) {
      return cleanSymbol + '\uFE0F';
    }

    return cleanSymbol;
  }

  function formatSymbolForUi(symbol) {
    var cleanSymbol = String(symbol || '').replace(/[\uFE0E\uFE0F]/g, '');

    if (cleanSymbol.length === 1) {
      return cleanSymbol + '\uFE0E';
    }

    return cleanSymbol;
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function (resolve, reject) {
      try {
        var input = document.createElement('textarea');
        input.value = text;
        input.setAttribute('readonly', '');
        input.style.position = 'absolute';
        input.style.left = '-9999px';
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        resolve();
      } catch (error) {
        reject(error);
      }
    });
  }

  function normalizeText(value) {
    return String(value || '').trim().toLowerCase();
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
})();
</script>
